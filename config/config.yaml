# =========================
# Dataset Configuration
# =========================
dataset:
  name: "chest_xray"
  kaggle_dataset: "amanullahasraf/covid19-pneumonia-normal-chest-xray-pa-dataset"
  download_path: "./data/raw/"
  image_size: 224

  class_names: ["covid", "normal", "pneumonia"]

  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

  train_split: 0.7
  val_split: 0.15
  test_split: 0.15


# =========================
# Task Configuration
# =========================
tasks:
  num_tasks: 2

  task_definitions:
    - name: "Task_1"
      classes: ["normal", "pneumonia"]

    - name: "Task_2"
      classes: ["normal", "pneumonia", "covid"]

  augmentation: true
  augmentation_strength: 0.3


# =========================
# Model Configuration
# =========================
model:
  backbone: "resnet18"
  pretrained: true
  embedding_dim: 512
  num_classes: 3
  dropout_rate: 0.3
  mc_dropout_samples: 10   # reduced for CPU


# =========================
# Training Configuration (CPU SAFE)
# =========================
training:
  batch_size: 16           # reduced for CPU
  epochs_per_task: 10
  learning_rate: 0.001
  optimizer: "adam"
  weight_decay: 0.00001    # FIXED (float, not string)
  num_workers: 0           # IMPORTANT for CPU
  clip_grad_norm: 5.0
  use_amp: false


# =========================
# EWC Configuration
# =========================
ewc:
  use_ewc: true
  task_aware: true
  fisher_eps: 0.0001
  lambda_cc: 1000.0
  lambda_sr: 500.0
  lambda_tp: 100.0


# =========================
# Drift Detection
# =========================
drift_detection:
  method: "page_hinkley"
  drift_threshold: 3.0
  window_size: 50


# =========================
# Replay Buffer
# =========================
replay_buffer:
  buffer_size: 300          # reduced for CPU
  use_replay: true
  embedding_only: false     # IMPORTANT FIX

  priority_weights:
    uncertainty: 0.5
    recency: 0.3
    diversity: 0.2


# =========================
# Hardware (CPU MODE)
# =========================
hardware:
  device: "cpu"
  num_workers: 0
  seed: 42


# =========================
# Logging
# =========================
logging:
  log_dir: "./logs/"
  checkpoint_dir: "./results/models/"
  metrics_dir: "./results/metrics/"
  plot_dir: "./results/plots/"